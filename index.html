# KanTan Marp
かんたんにスライドを作れる、ローカル完結型の Marp エディタ/レンダラー

---

## このツールでできること

- ブラウザさえあれば動作（専用アプリのインストール不要）
- Markdown だけでスライド作成
- CSS を直接編集して見た目を調整
- 画像を貼り付け・添付して埋め込み
- レーザーポインターでプレゼン表示
- 単体 HTML として保存して共有

---

## 基本操作（プレゼン画面）

- `Esc`: 編集モードへ切り替え
- `←` / `→`: 前後スライド
- `Home` / `End`: 先頭・末尾へ移動
- `Ctrl + L`: レーザーポインター ON/OFF
- `Ctrl + S`: 保存（単体HTMLを書き出し）

---

## 編集モードの使い方

1. `Markdown` タブで本文を編集
2. `CSS` タブでテーマを調整
3. 右側プレビューで見た目を確認
4. 必要なら画像添付フォームで画像を追加
5. `プレゼン表示` ボタンで即確認

---

## CSS カスタマイズのコツ

- 全体背景: `:root { --app-background: ... }`
- 角丸: `--app-radius`
- 境界線色: `--ui-border`, `--slide-border`
- 進捗バー色: `--progress-line-color`

少しずつ変えて、プレビューで差分を確認するのがおすすめです。

---

# Markdown 記法ガイド
ここからは、よく使う書き方をサンプルで確認します。

---

## 1. 見出し・強調・インライン記法

これは **太字**、これは *斜体*、これは ~~取り消し~~。  
インラインコード: `const answer = 42`

---

## 2. リスト

- 箇条書き A
- 箇条書き B
  - ネスト B-1
  - ネスト B-2
- 箇条書き C

1. 番号付き 1
2. 番号付き 2
3. 番号付き 3

---

## 3. 引用・区切り・チェックリスト

> これは引用です。  
> 複数行の引用も確認できます。

- [x] チェック済み
- [ ] 未チェック

---

## 4. テーブル

| 項目 | 説明 | 値 |
| --- | --- | ---: |
| A | サンプル行 | 10 |
| B | 右寄せ列の確認 | 20 |
| C | 表の見た目チェック | 30 |

---

## 5. コードブロック

```ts
type User = { id: number; name: string };

const users: User[] = [
  { id: 1, name: 'Aoi' },
  { id: 2, name: 'Ren' },
];

console.log(users.map((u) => u.name).join(', '));
```
